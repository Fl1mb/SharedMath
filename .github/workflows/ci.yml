name: CI

on:
  push:
    branches: [main, "develop**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: "${{ matrix.os }} · ${{ matrix.compiler.cc }} · ${{ matrix.build_type }} · shared=${{ matrix.shared }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-latest, windows-latest]
        build_type: [Debug, Release]
        shared: [OFF, ON]
        compiler:
          - { cc: gcc,   cxx: g++ }
          - { cc: clang, cxx: clang++ }
        include:
          # MSVC on Windows
          - os: windows-latest
            compiler: { cc: cl, cxx: cl }
            build_type: Debug
            shared: OFF
          - os: windows-latest
            compiler: { cc: cl, cxx: cl }
            build_type: Debug
            shared: ON
          - os: windows-latest
            compiler: { cc: cl, cxx: cl }
            build_type: Release
            shared: OFF
          - os: windows-latest
            compiler: { cc: cl, cxx: cl }
            build_type: Release
            shared: ON
        exclude:
          # Clang is tested only on the latest Ubuntu runner to keep matrix manageable
          - { os: ubuntu-22.04, compiler: { cc: clang, cxx: clang++ } }
          - { os: ubuntu-24.04, compiler: { cc: clang, cxx: clang++ } }
          # Don't run GCC/Clang on Windows (use MSVC instead)
          - { os: windows-latest, compiler: { cc: gcc, cxx: g++ } }
          - { os: windows-latest, compiler: { cc: clang, cxx: clang++ } }

    env:
      CC:        ${{ matrix.compiler.cc }}
      CXX:       ${{ matrix.compiler.cxx }}
      BUILD_DIR: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools and GTest (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libgtest-dev \
            libgmock-dev

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja
          # Add Ninja to PATH
          echo "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          cmake -B $BUILD_DIR -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSharedMath_SHARED_LIBS=${{ matrix.shared }} \
            -DSharedMath_BUILD_TESTS=ON \
            -DSharedMath_BUILD_EXAMPLES=OFF

      - name: Configure (Windows MSVC)
        if: runner.os == 'Windows'
        run: |
          cmake -B $BUILD_DIR -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSharedMath_SHARED_LIBS=${{ matrix.shared }} \
            -DSharedMath_BUILD_TESTS=ON \
            -DSharedMath_BUILD_EXAMPLES=OFF \
            -DCMAKE_C_COMPILER=cl \
            -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build $BUILD_DIR --parallel

      - name: Test
        run: ctest --test-dir $BUILD_DIR --output-on-failure --parallel $(nproc)

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "test-logs-${{ matrix.os }}-${{ matrix.compiler.cc }}-${{ matrix.build_type }}-shared${{ matrix.shared }}"
          path: ${{ env.BUILD_DIR }}/Testing/
          retention-days: 7