name: CI

on:
  push:
    branches: [main, "develop**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: "${{ matrix.os }} · ${{ matrix.toolchain }} · ${{ matrix.build_type }} · shared=${{ matrix.shared }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, windows-latest]
        build_type: [Debug, Release]
        shared: [OFF, ON]
        include:
          - os: ubuntu-22.04
            toolchain: gcc
          - os: ubuntu-24.04
            toolchain: gcc
          - os: windows-latest
            toolchain: msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools and GTest (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libgtest-dev \
            libgmock-dev

      - name: Configure (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSharedMath_SHARED_LIBS=${{ matrix.shared }} \
            -DSharedMath_BUILD_TESTS=ON \
            -DSharedMath_BUILD_EXAMPLES=OFF \
            -DSHAREDMATH_ENABLE_CUDA=OFF \
            -DSharedMath_ENABLE_CUDA_DSP=OFF

      - name: Configure (Windows MSVC)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DSharedMath_SHARED_LIBS=${{ matrix.shared }} `
            -DSharedMath_BUILD_TESTS=ON `
            -DSharedMath_BUILD_EXAMPLES=OFF `
            -DSHAREDMATH_ENABLE_CUDA=OFF `
            -DSharedMath_ENABLE_CUDA_DSP=OFF

      - name: Add Windows runtime DLL paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @(
            "$PWD\build\LinearAlgebra\${{ matrix.build_type }}",
            "$PWD\build\geometry\${{ matrix.build_type }}",
            "$PWD\build\NumericalMethods\${{ matrix.build_type }}",
            "$PWD\build\tests\${{ matrix.build_type }}"
          ) | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

      - name: Test (Windows MSVC)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure --parallel $env:NUMBER_OF_PROCESSORS

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "test-logs-${{ matrix.os }}-${{ matrix.toolchain }}-${{ matrix.build_type }}-shared${{ matrix.shared }}"
          path: build/Testing/
          retention-days: 7
