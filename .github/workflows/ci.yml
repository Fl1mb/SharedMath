name: CI

on:
  push:
    branches: [main, "develop**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: "${{ matrix.os }} · ${{ matrix.compiler.cc }} · ${{ matrix.build_type }} · shared=${{ matrix.shared }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-latest, windows-latest]
        build_type: [Debug, Release]
        shared: [OFF, ON]
        compiler:
          - { cc: gcc,   cxx: g++ }
          - { cc: clang, cxx: clang++ }
        include:
          # MSVC on Windows - specify which VS version to use
          - os: windows-latest
            compiler: { cc: cl, cxx: cl }
            build_type: Debug
            shared: OFF
            vs_version: "2022"
          - os: windows-latest
            compiler: { cc: cl, cxx: cl }
            build_type: Debug
            shared: ON
            vs_version: "2022"
          - os: windows-latest
            compiler: { cc: cl, cxx: cl }
            build_type: Release
            shared: OFF
            vs_version: "2022"
          - os: windows-latest
            compiler: { cc: cl, cxx: cl }
            build_type: Release
            shared: ON
            vs_version: "2022"
        exclude:
          - { os: ubuntu-22.04, compiler: { cc: clang, cxx: clang++ } }
          - { os: ubuntu-24.04, compiler: { cc: clang, cxx: clang++ } }
          - { os: windows-latest, compiler: { cc: gcc, cxx: g++ } }
          - { os: windows-latest, compiler: { cc: clang, cxx: clang++ } }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Visual Studio (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: ${{ matrix.vs_version }}

      - name: Install build tools and GTest (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libgtest-dev \
            libgmock-dev

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja
          echo "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSharedMath_SHARED_LIBS=${{ matrix.shared }} \
            -DSharedMath_BUILD_TESTS=ON \
            -DSharedMath_BUILD_EXAMPLES=OFF

      - name: Configure (Windows MSVC)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cmake -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ^
            -DSharedMath_SHARED_LIBS=${{ matrix.shared }} ^
            -DSharedMath_BUILD_TESTS=ON ^
            -DSharedMath_BUILD_EXAMPLES=OFF

      - name: Build
        shell: bash
        run: cmake --build build --parallel

      - name: Test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: ctest --test-dir build --output-on-failure --parallel

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "test-logs-${{ matrix.os }}-${{ matrix.compiler.cc }}-${{ matrix.build_type }}-shared${{ matrix.shared }}"
          path: build/Testing/
          retention-days: 7