name: CUDA

# ── When this workflow runs ───────────────────────────────────────────────────
#
#  • push / PR  →  compile-only job (no physical GPU required).
#                  GPU tests call cuda_is_available() → false → GTEST_SKIP().
#                  Purpose: catch CUDA compilation errors in every PR.
#
#  • workflow_dispatch  →  both jobs; the GPU-runtime job requires a
#                          self-hosted runner with label "gpu".
#
#  • PR label "run-gpu-tests"  →  same as workflow_dispatch.
#
on:
  push:
    branches: [main, "develop**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      cuda_version:
        description: "CUDA toolkit version to install (compile job)"
        required: false
        default: "12.6.2"
        type: string
      build_type:
        description: "CMake build type"
        required: false
        default: "Release"
        type: choice
        options: [Debug, Release]

# Cancel redundant runs on the same branch
concurrency:
  group: cuda-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # Job 1 — CUDA compile + CPU-fallback test
  # ══════════════════════════════════════════════════════════════════════════
  #
  # Runs on a standard GitHub-hosted Ubuntu runner (no physical GPU).
  # • Installs the CUDA toolkit (nvcc + cuBLAS headers + cudart).
  # • Builds the library with -DSHAREDMATH_ENABLE_CUDA=ON.
  # • Runs the full test suite:
  #     - CUDA tests that probe cuda_is_available() → false → auto-skip.
  #     - Everything else passes normally.
  # Validates that CUDA code compiles clean on every push/PR.
  # ══════════════════════════════════════════════════════════════════════════

  cuda-compile:
    name: "CUDA compile · ${{ matrix.cuda }} · ${{ matrix.build_type }}"
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        # Test two toolkit generations: current LTS + latest
        cuda:        ["12.3.2", "12.6.2"]
        build_type:  [Debug, Release]
        # On manual dispatch use the user-chosen values instead
        exclude:
          - cuda: "12.6.2"  # placeholder; real exclusions added below if needed

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── CUDA Toolkit ─────────────────────────────────────────────────────
      # Jimver/cuda-toolkit installs nvcc, cudart, cublas from the official
      # NVIDIA network repo.  Only the compiler + runtime + math libs are
      # fetched — not the full 3 GB driver package.
      - name: Install CUDA Toolkit ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.18
        id: cuda-toolkit
        with:
          cuda:         ${{ matrix.cuda }}
          method:       network
          # Minimal subset: compiler, runtime, cuBLAS headers + libs
          sub-packages: '["nvcc", "cudart", "cudart-dev", "cublas", "cublas-dev"]'

      # ── System deps ──────────────────────────────────────────────────────
      - name: Install Ninja and GTest
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libgtest-dev \
            libgmock-dev

      # ── Sanity ───────────────────────────────────────────────────────────
      - name: Verify toolchain
        run: |
          nvcc --version
          echo "CUDA_PATH=${{ steps.cuda-toolkit.outputs.CUDA_PATH }}"

      # ── Configure ────────────────────────────────────────────────────────
      # CUDA_ARCHITECTURES covers Turing (75), Ampere (86), Ada (89).
      # "native" cannot be used here because there is no physical GPU.
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSHAREDMATH_ENABLE_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES="75;86;89" \
            -DSharedMath_BUILD_TESTS=ON \
            -DSharedMath_BUILD_EXAMPLES=OFF

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── Test ─────────────────────────────────────────────────────────────
      # GPU-specific tests call cuda_is_available() → false → GTEST_SKIP().
      # All non-GPU tests (CG, LSQR, matrix functions, etc.) run normally.
      - name: Test (GPU tests auto-skip — no hardware GPU on this runner)
        run: |
          ctest --test-dir build \
            --output-on-failure \
            --parallel "$(nproc)"

      # ── Artifacts on failure ──────────────────────────────────────────────
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "cuda-compile-logs-${{ matrix.cuda }}-${{ matrix.build_type }}"
          path: build/Testing/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  # Job 2 — Full GPU runtime test
  # ══════════════════════════════════════════════════════════════════════════
  #
  # Requires a self-hosted runner registered with labels [self-hosted, linux, gpu].
  #
  # How to set one up:
  #   1. Provision a Linux machine with an Nvidia GPU (local server, AWS p3/g4/g5,
  #      GCP A100/T4, Azure NC-series, Lambda Labs, etc.).
  #   2. Install the Nvidia driver + CUDA toolkit.
  #   3. Register a GitHub Actions runner:
  #        https://github.com/<org>/<repo>/settings/actions/runners/new
  #      Add the extra label "gpu" during setup.
  #   4. Start the runner.  This job will pick it up automatically on
  #      workflow_dispatch or when a PR carries the "run-gpu-tests" label.
  #
  # continue-on-error: true  means a missing / offline runner will not fail
  # the overall workflow status — it shows as a warning instead.
  #
  # ── GitHub-hosted GPU runners (optional) ──────────────────────────────────
  # GitHub offers GPU-accelerated hosted runners (A10G / T4) under "Larger
  # runners" on Team/Enterprise plans.  To use them replace
  #   runs-on: [self-hosted, linux, gpu]
  # with the appropriate label, e.g.:
  #   runs-on: ubuntu-latest-gpu   # hypothetical; check your plan's catalog
  # See https://docs.github.com/en/actions/using-github-hosted-runners
  # ══════════════════════════════════════════════════════════════════════════

  cuda-gpu-runtime:
    name: "CUDA GPU runtime · ${{ matrix.build_type }}"
    runs-on: [self-hosted, linux, gpu]

    # Run only when explicitly requested (manual dispatch or PR label).
    # This prevents the job from failing every push because no runner is online.
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-gpu-tests')

    # A missing / offline self-hosted runner must not block the overall CI.
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── GPU sanity ────────────────────────────────────────────────────────
      - name: Verify GPU and CUDA environment
        run: |
          nvidia-smi
          nvcc --version
          echo "CUDA_HOME=${CUDA_HOME:-not set}"

      # ── System deps ──────────────────────────────────────────────────────
      - name: Install Ninja and GTest
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libgtest-dev \
            libgmock-dev

      # ── Configure ────────────────────────────────────────────────────────
      # "native" auto-detects the SM version of the runner's GPU — fastest
      # compilation + optimal code gen for that specific card.
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSHAREDMATH_ENABLE_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES=native \
            -DSharedMath_BUILD_TESTS=ON \
            -DSharedMath_BUILD_EXAMPLES=OFF

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── GPU info (visible in the run log) ─────────────────────────────────
      - name: GPU details
        run: |
          nvidia-smi \
            --query-gpu=name,driver_version,memory.total,compute_cap \
            --format=csv,noheader

      # ── Test ─────────────────────────────────────────────────────────────
      # All tests run, including the large-matrix CUDA stress tests.
      # --output-on-failure prints timing lines (GPU vs CPU ms) for each test.
      - name: Test (full GPU suite)
        run: |
          ctest --test-dir build \
            --output-on-failure \
            --parallel "$(nproc)" \
            --test-output-size-passed 524288

      # ── Artifacts on failure ──────────────────────────────────────────────
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "cuda-gpu-logs-${{ matrix.build_type }}"
          path: build/Testing/
          retention-days: 14
